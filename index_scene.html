<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  /* Device split: MOBILE → the hero page; DESKTOP stays on this tokonoma scene. (?stay to override) */
  if(!/[?&]stay/i.test(location.search) && matchMedia('(pointer:coarse)').matches) location.replace('index.html');
</script>
<title>XRZENO — Scene</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0e0c0a;font-family:system-ui,sans-serif}
  #gl{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
  #track{position:relative;width:100%;height:400vh;z-index:0;pointer-events:none}
  @media (pointer:coarse){ body{overflow:hidden} #track{height:100vh} }
  :root{ --ink:#f3ece1; --muted:#9a8c79; --accent:#e8a05c; }
  #brand{position:fixed;top:22px;left:24px;z-index:50;font-size:15px;letter-spacing:.28em;font-weight:600;color:var(--ink)}
  #ar{position:fixed;z-index:30;bottom:9%;left:50%;transform:translateX(-50%) translateY(12px);opacity:0;transition:opacity .6s,transform .6s;pointer-events:none}
  #ar.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #ar button{background:transparent;color:var(--ink);border:1px solid rgba(232,160,92,.55);padding:15px 30px;border-radius:100px;font-size:15px;letter-spacing:.02em;cursor:pointer;font-family:inherit;transition:background .3s,border-color .3s;backdrop-filter:blur(6px)}
  #ar button:hover{background:rgba(232,160,92,.12);border-color:var(--accent)}
  #hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:40;color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;animation:fade 2.6s infinite;transition:opacity .4s}
  @keyframes fade{0%,100%{opacity:.3}50%{opacity:.8}}
  #toast{position:fixed;z-index:70;left:50%;bottom:20%;transform:translateX(-50%) translateY(10px);max-width:min(86vw,400px);padding:16px 22px;background:rgba(36,29,22,.82);backdrop-filter:blur(10px);border:1px solid rgba(232,160,92,.45);border-radius:16px;box-shadow:0 14px 44px rgba(0,0,0,.5);color:var(--ink);font-size:14px;line-height:1.45;text-align:center;opacity:0;pointer-events:none;transition:opacity .35s,transform .35s}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast b{color:var(--accent);font-weight:600}
  #toast .t-sub{display:block;margin-top:6px;color:var(--muted);font-size:13px}
  #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    color:#b6a890;font-size:14px;background:#0e0c0a;z-index:5;transition:opacity .6s}
  #loader.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="track"></div>
<div id="loader">loading scene…</div>
<div id="brand">XRZENO</div>
<div id="ar"><button id="arBtn">View in your space</button></div>
<div id="hint">Scroll to materialize ↓</div>
<div id="toast"></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshSurfaceSampler } from 'three/addons/math/MeshSurfaceSampler.js';
import { EXRLoader } from 'three/addons/loaders/EXRLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { FullScreenQuad } from 'three/addons/postprocessing/Pass.js';
RectAreaLightUniformsLib.init();

const cv = document.getElementById('gl');
const loader = document.getElementById('loader');
let W = innerWidth, H = innerHeight;
const MASK_LAYER = 1;
const isMobile = matchMedia('(pointer:coarse)').matches;

const renderer = new THREE.WebGLRenderer({canvas:cv, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
renderer.setSize(W,H);
renderer.setClearColor(0x000000, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
let exposure = 0.95; renderer.toneMappingExposure = exposure;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.transmissionResolutionScale = isMobile ? 0.5 : 1.0; // full transmission res on desktop, half on mobile

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x16130f); // index2 warm-charcoal stage
const camera = new THREE.PerspectiveCamera(40, W/H, 0.01, 1000);

const pmrem = new THREE.PMREMGenerator(renderer);
function makeWarmEnv(){
  const c=document.createElement('canvas'); c.width=512; c.height=256;
  const x=c.getContext('2d'); const g=x.createLinearGradient(0,0,0,256);
  g.addColorStop(0.00,'#6b5238'); g.addColorStop(0.45,'#3a2c1d');
  g.addColorStop(0.55,'#281d13'); g.addColorStop(1.00,'#0d0905');
  x.fillStyle=g; x.fillRect(0,0,512,256);
  const t=new THREE.CanvasTexture(c);
  t.mapping=THREE.EquirectangularReflectionMapping; t.colorSpace=THREE.SRGBColorSpace;
  const env=pmrem.fromEquirectangular(t).texture; t.dispose(); return env;
}
const warmEnv = makeWarmEnv();
function makeDarkEnv(){ // near-black env: provides the envMap define (no recompile on HDRI swap) WITHOUT
  const c=document.createElement('canvas'); c.width=c.height=4;   // washing the tray's clearcoat pale
  const x=c.getContext('2d'); x.fillStyle='#0a0806'; x.fillRect(0,0,4,4);
  const t=new THREE.CanvasTexture(c); t.mapping=THREE.EquirectangularReflectionMapping;
  const e=pmrem.fromEquirectangular(t).texture; t.dispose(); return e;
}
const darkEnv = makeDarkEnv();
let hdrEnv = null, hdrTex = null, bgHdr = false;
let envMode = 'off';
scene.environment = darkEnv;      // dark transient env: keeps lacquer dark + envMap define present for compile
scene.environmentIntensity = 0;

new EXRLoader().load('Tokonama%20Scene/japanese-room_2K_42d6555f-dde5-4c27-873f-2bdc57fcc945.exr', (tex)=>{
  tex.mapping = THREE.EquirectangularReflectionMapping;
  hdrTex = tex; hdrEnv = pmrem.fromEquirectangular(tex).texture; applyEnv('hdri');
  glassMats.forEach(m=>{ m.envMap = hdrEnv; m.needsUpdate = true; }); // fake glass reflects the room
}, undefined, (err)=>{ console.error('HDRI load failed', err); });

function applyEnv(mode){
  envMode = mode;
  scene.environment = mode==='hdri' ? hdrEnv : mode==='warm' ? warmEnv : null;
  if(typeof curF !== 'undefined' && curF > 0.9) rebakeProbe(); // only re-bake when formed (meshes visible), never on the async HDRI load
}
function rebakeProbe(){
  const p = window._trayProbe; if(!p) return;
  const v = p.tray.visible; p.tray.visible = false;
  p.cubeCam.update(renderer, scene);
  p.tray.visible = v;
}

// ---- LIGHTS (baked) ----
const spot = new THREE.SpotLight(0xffda95, 6, 5.3527, 0.87, 0.6, 2);
spot.castShadow = true;
spot.shadow.mapSize.setScalar(isMobile?2048:4096); spot.shadow.bias=-0.0004; spot.shadow.normalBias=0.02; spot.shadow.focus=1;
scene.add(spot); scene.add(spot.target);
const shojiArea = new THREE.RectAreaLight(0xffdca8, 0, 1, 1); scene.add(shojiArea);
const museum = new THREE.SpotLight(0xfff4e2, 2, 1.6, 0.28, 0.4, 2);
museum.castShadow = true;
museum.shadow.mapSize.setScalar(isMobile?1024:2048); museum.shadow.bias=-0.0004; museum.shadow.normalBias=0.02; museum.shadow.focus=1;
scene.add(museum); scene.add(museum.target);

const controls = new OrbitControls(camera, cv);
controls.enableDamping = true;
const maxAniso = renderer.capabilities.getMaxAnisotropy();

// ===== MASK BLUR PIPELINE =====
// bottle silhouette stays sharp; everything else gets a gaussian blur (depth-independent fake DOF).
let blurOn = true, blurSpread = 1, featherSpread = 1; // BAKED
const maskMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
let sharpRT, maskRT, maskTmp, maskFeather, blurA, blurB, bloomRT;
function allocTargets(){
  sharpRT     = new THREE.WebGLRenderTarget(W, H, { type: THREE.HalfFloatType, samples: isMobile ? 0 : 4 });
  maskRT      = new THREE.WebGLRenderTarget(W, H);
  maskTmp     = new THREE.WebGLRenderTarget(W, H);
  maskFeather = new THREE.WebGLRenderTarget(W, H);
  bloomRT     = new THREE.WebGLRenderTarget(W, H, { type: THREE.HalfFloatType, depthBuffer:false });
  const hw = Math.max(1, W>>1), hh = Math.max(1, H>>1);
  blurA = new THREE.WebGLRenderTarget(hw, hh, { type: THREE.HalfFloatType, depthBuffer:false });
  blurB = new THREE.WebGLRenderTarget(hw, hh, { type: THREE.HalfFloatType, depthBuffer:false });
}
allocTargets();

const fsQuad = new FullScreenQuad();
const blurMat = new THREE.ShaderMaterial({
  uniforms: { tDiffuse:{value:null}, uDir:{value:new THREE.Vector2()}, uTexel:{value:new THREE.Vector2()} },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform vec2 uDir; uniform vec2 uTexel; varying vec2 vUv;
    void main(){
      vec2 o = uDir * uTexel;
      vec4 c  = texture2D(tDiffuse, vUv) * 0.227027;
      c += texture2D(tDiffuse, vUv + o*1.3846) * 0.316216;
      c += texture2D(tDiffuse, vUv - o*1.3846) * 0.316216;
      c += texture2D(tDiffuse, vUv + o*3.2308) * 0.070270;
      c += texture2D(tDiffuse, vUv - o*3.2308) * 0.070270;
      gl_FragColor = c;
    }`
});
function doBlur(srcTex, dstRT, dx, dy){
  blurMat.uniforms.tDiffuse.value = srcTex;
  blurMat.uniforms.uDir.value.set(dx, dy);
  blurMat.uniforms.uTexel.value.set(1/dstRT.width, 1/dstRT.height);
  renderer.setRenderTarget(dstRT); fsQuad.material = blurMat; fsQuad.render(renderer);
}
const copyMat = new THREE.ShaderMaterial({
  uniforms: { tDiffuse:{value:null} },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `uniform sampler2D tDiffuse; varying vec2 vUv; void main(){ gl_FragColor = texture2D(tDiffuse, vUv); }`
});
function copyTex(srcTex, dstRT){
  copyMat.uniforms.tDiffuse.value = srcTex;
  renderer.setRenderTarget(dstRT); fsQuad.material = copyMat; fsQuad.render(renderer);
}

// composite (linear) → OutputPass tonemaps. tDiffuse unused but required by ShaderPass.
const composer = new EffectComposer(renderer);
const CompositeShader = {
  uniforms: { tDiffuse:{value:null}, tSharp:{value:null}, tBlur:{value:null}, tMask:{value:null}, uEnabled:{value:1} },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tSharp, tBlur, tMask; uniform float uEnabled; varying vec2 vUv;
    void main(){
      vec3 sharp = texture2D(tSharp, vUv).rgb;
      if(uEnabled < 0.5){ gl_FragColor = vec4(sharp, 1.0); return; }
      vec3 blur = texture2D(tBlur, vUv).rgb;
      float m = texture2D(tMask, vUv).r;
      gl_FragColor = vec4(mix(blur, sharp, m), 1.0);
    }`
};
const compositePass = new ShaderPass(CompositeShader);
// bloom the dust embers as a NATIVE composer pass (exactly like index2): composite -> bloom -> output
const bloom = new UnrealBloomPass(new THREE.Vector2(W,H), 0.85, 0.45, 0.2);
composer.addPass(compositePass);
composer.addPass(bloom);
composer.addPass(new OutputPass());

function renderMaskBlur(){
  camera.layers.set(0);
  renderer.setRenderTarget(sharpRT);
  renderer.render(scene, camera);              // sharp scene (transmission intact), linear
  if(!blurOn) return;
  // bottle silhouette → mask
  const pBg = scene.background, pOv = scene.overrideMaterial;
  scene.background = null; scene.overrideMaterial = maskMat;
  camera.layers.set(MASK_LAYER);
  renderer.setRenderTarget(maskRT); renderer.clear(); renderer.render(scene, camera);
  scene.overrideMaterial = pOv; scene.background = pBg; camera.layers.set(0);
  // feather the mask edge
  doBlur(maskRT.texture,  maskTmp,     featherSpread, 0);
  doBlur(maskTmp.texture, maskFeather, 0, featherSpread);
  // blur the scene (half-res; 2 iterations desktop, 1 mobile)
  doBlur(sharpRT.texture, blurA, blurSpread, 0);
  doBlur(blurA.texture,   blurB, 0, blurSpread);
  if(!isMobile){
    doBlur(blurB.texture, blurA, blurSpread, 0);
    doBlur(blurA.texture, blurB, 0, blurSpread);
  }
}

// ===== MATERIALIZE (points coalesce into the bottle; set fades in at the end) =====
const clamp = v => Math.max(0, Math.min(1, v));
const easeInOut = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
function makeDot(){
  const s=64,c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d'), g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(.35,'rgba(255,255,255,.55)'); g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}
const dotTex = makeDot();
const COUNT = isMobile ? 16000 : 36000;
let bottleMeshes=[], setMeshes=[], glassMats=[], points=null, pointGeo=null, homePos=null, scatterPos=null, modelReady=false, probeBaked=false, dustPivot=null;
let targetF=0, curF=0, lastFormF=-1;
const trackEl = document.getElementById('track');
function scrollProgress(){ const sc=trackEl.offsetHeight-innerHeight; return sc>0?clamp(scrollY/sc):0; }
function setOpacity(m,a){
  if(m.userData.isGlass){ m.visible = a > 0.001; return; } // fake glass: show/hide only, keep its alpha (don't go opaque at full form)
  const mats=Array.isArray(m.material)?m.material:[m.material];
  for(const mat of mats){ const o=mat.userData._op ?? 1; mat.opacity=o*a; mat.transparent = a<0.999; }
  m.visible = a>0.001;
}
function setForm(f){
  if(!modelReady) return;
  if(f !== lastFormF){                          // idle-skip: only rewrite the buffer when form changed
    lastFormF = f;
    const e = easeInOut(Math.min(1, f/0.7));     // dust flies home over the first 70%
    const p = pointGeo.attributes.position.array;
    for(let i=0;i<COUNT;i++){ const j=i*3;
      p[j]  =scatterPos[j]  +(homePos[j]  -scatterPos[j])*e;
      p[j+1]=scatterPos[j+1]+(homePos[j+1]-scatterPos[j+1])*e;
      p[j+2]=scatterPos[j+2]+(homePos[j+2]-scatterPos[j+2])*e; }
    pointGeo.attributes.position.needsUpdate=true;
  }
  const meshIn=clamp((f-0.55)/0.45), setIn=clamp((f-0.9)/0.1);
  for(const m of bottleMeshes) setOpacity(m, meshIn);
  for(const m of setMeshes) setOpacity(m, setIn);
  points.material.opacity=0.9*(1-meshIn); points.visible=meshIn<1;
}

new GLTFLoader().load('Tokonama%20Scene/shinobu_tokonoma.glb', async (gltf)=>{
  const obj = gltf.scene;
  scene.add(obj);

  let shoji = null, tray = null;
  obj.traverse(o=>{
    if(!o.isMesh || !o.material) return;
    const mat = o.material, mname = (mat.name||'') + ' ' + (o.name||'');
    for(const k of ['map','normalMap','roughnessMap','metalnessMap','emissiveMap'])
      if(mat[k]) mat[k].anisotropy = maxAniso;
    const isGlass = mat.transmission > 0 || /glass/i.test(mname);
    const isPaper = /shoji.?paper|shojipaper/i.test(mname);
    o.receiveShadow = true;
    o.castShadow = !isGlass && !isPaper;
    if(isGlass){
      // FAKE glass (hero recipe) — drop real transmission (a full 2nd scene-render/frame). Black alpha +
      // env reflections. Reflects the HDRI room via an explicit envMap so it reads glassy despite the
      // scene's dark env (intensity 0). Materialize treats it as visibility-only (setOpacity).
      o.userData.isGlass = true;
      mat.transmission = 0; mat.color.setHex(0x000000);
      mat.transparent = true; mat.opacity = 0.12;
      mat.roughness = 0.04; mat.metalness = 0;
      mat.envMap = warmEnv; mat.envMapIntensity = 1.3; // upgraded to the HDRI once it loads
      mat.depthWrite = false; mat.needsUpdate = true;
      glassMats.push(mat);
    }
    if(isPaper) shoji = o;
    if(/tray/i.test(mname)) tray = o;
    if(isGlass || /3dmodel/i.test(mname)){ o.layers.enable(MASK_LAYER); bottleMeshes.push(o); } // the sharp HERO (bottle + glass)
    else setMeshes.push(o);                                                                     // the set (fades in last)
  });

  scene.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(obj);
  const c = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const r = size.length() * 0.5 || 1;

  // BAKED starting camera
  camera.position.set(-0.1511, 0.1003, 0.3049);
  controls.target.set(0.0561, 0.1369, -0.0639);
  camera.fov = 40;
  camera.near = Math.max(r/100, 0.01); camera.far = r*30; camera.updateProjectionMatrix();
  controls.minDistance = r*0.05; controls.maxDistance = r*8;
  controls.update();
  window._home = camera.position.clone();
  window._homeTarget = controls.target.clone();

  // CONSTRAINTS: lock zoom + pan; orbit ±45° (az + polar) from the FRONT view; floor cap on down-orbit
  controls.enableZoom = false; controls.enablePan = false;
  const LIM = Math.PI/4;
  const frontSph = new THREE.Spherical().setFromVector3(new THREE.Vector3(0.0435, 0.1458, 0.3604).sub(controls.target));
  const lowSph   = new THREE.Spherical().setFromVector3(new THREE.Vector3(-0.2387, 0.0096, 0.2139).sub(controls.target));
  controls.minAzimuthAngle = frontSph.theta - LIM;
  controls.maxAzimuthAngle = frontSph.theta + LIM;
  controls.minPolarAngle = Math.max(0.01, frontSph.phi - LIM);
  controls.maxPolarAngle = lowSph.phi;
  controls.update();

  if(shoji){
    const sb = new THREE.Box3().setFromObject(shoji);
    const sc = sb.getCenter(new THREE.Vector3()), ss = sb.getSize(new THREE.Vector3());
    shojiArea.width = (Math.max(ss.x, ss.z)||r*0.5)*1.05; shojiArea.height = (ss.y||r*0.6)*1.05;
    shojiArea.position.copy(sc).lerp(c, 0.03); shojiArea.lookAt(c);
  }

  // shoji spot — BAKED
  spot.position.set(0.777, 0.6579, -0.0239);
  spot.target.position.set(0.0134, 0.1496, -0.2895);
  spot.intensity = 6; spot.angle = 0.87; spot.penumbra = 0.6; spot.decay = 2;
  spot.distance = 5.3527; spot.color.set('#ffda95'); spot.shadow.bias = -0.0004;
  spot.shadow.camera.near = r*0.05; spot.shadow.camera.far = Math.max(r*8, 7);
  spot.shadow.camera.updateProjectionMatrix();

  // museum downlight — BAKED
  museum.position.set(0.032, 0.6984, 0.5935);
  museum.target.position.set(0.0372, 0.2341, -0.0359);
  museum.intensity = 2; museum.angle = 0.28; museum.penumbra = 0.4; museum.decay = 2;
  museum.distance = 1.6; museum.color.set('#fff4e2');
  museum.shadow.camera.near = r*0.05; museum.shadow.camera.far = Math.max(r*8, 7);
  museum.shadow.camera.updateProjectionMatrix();

  // (tray reflection probe removed — it mirrored the bright plaster walls onto the lacquer and washed it
  //  pale. The tray now reads as natural DarkWood + clearcoat, lit by the scene.)

  // ---- build the materialize points from the bottle BODY (non-glass hero meshes) ----
  const sampleMeshes = bottleMeshes.filter(m=>{
    const mt = Array.isArray(m.material) ? m.material[0] : m.material;
    return !(mt.transmission > 0 || /glass/i.test(mt.name||''));
  });
  const sbox = new THREE.Box3(); sampleMeshes.forEach(m=>sbox.expandByObject(m));
  const bcenter = sbox.getCenter(new THREE.Vector3());
  const bsz = sbox.getSize(new THREE.Vector3());
  const maxDim = Math.max(bsz.x, bsz.y, bsz.z) || 1; // index2 used the model's maxDim (normalized to 0.62)
  homePos = new Float32Array(COUNT*3); scatterPos = new Float32Array(COUNT*3);
  const colors = new Float32Array(COUNT*3), tmpP = new THREE.Vector3();
  const vc = sampleMeshes.map(m=>m.geometry.attributes.position.count), tv = vc.reduce((a,b)=>a+b,0)||1;
  let idx = 0;
  sampleMeshes.forEach((m,mi)=>{
    const n = mi===sampleMeshes.length-1 ? COUNT-idx : Math.round(COUNT*vc[mi]/tv);
    const sampler = new MeshSurfaceSampler(m).build();
    for(let k=0;k<n && idx<COUNT;k++,idx++){
      sampler.sample(tmpP); tmpP.applyMatrix4(m.matrixWorld);
      // store RELATIVE to the bottle centre so the dust cloud can float (rotate) around it
      homePos[idx*3]=tmpP.x-bcenter.x; homePos[idx*3+1]=tmpP.y-bcenter.y; homePos[idx*3+2]=tmpP.z-bcenter.z;
      const dir = new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize();
      const rr = maxDim*(1.13+Math.random()*1.77);  // index2 shell: 0.7–1.8 around a 0.62 model → 1.13–2.9× maxDim
      scatterPos[idx*3]=dir.x*rr; scatterPos[idx*3+1]=dir.y*rr; scatterPos[idx*3+2]=dir.z*rr;
      colors[idx*3]=0.92; colors[idx*3+1]=0.74; colors[idx*3+2]=0.52; // index2 exact warm tint
    }
  });
  pointGeo = new THREE.BufferGeometry();
  pointGeo.setAttribute('position', new THREE.BufferAttribute(scatterPos.slice(), 3));
  pointGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  points = new THREE.Points(pointGeo, new THREE.PointsMaterial({
    size: maxDim*0.0177, map: dotTex, vertexColors: true, transparent: true, opacity: 0.9, // index2 size 0.011 on a 0.62 model
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true
  }));
  dustPivot = new THREE.Group(); dustPivot.position.copy(bcenter); dustPivot.add(points); scene.add(dustPivot);
  // remember original opacities, then start fully un-formed (bottle + set hidden, dust scattered)
  [...bottleMeshes, ...setMeshes].forEach(m=>{
    const mats = Array.isArray(m.material)?m.material:[m.material];
    mats.forEach(mat=>{ mat.userData._op = mat.opacity; });
  });
  modelReady = true;

  // WARM-UP: compileAsync() BLOCKS until shaders are truly linked. Plain compile()+render does NOT with
  // parallel shader compilation — the link finalizes on first real use → that was the "first form" hitch.
  function warmFrame(){
    renderMaskBlur();
    compositePass.uniforms.tSharp.value=sharpRT.texture; compositePass.uniforms.tBlur.value=blurB.texture;
    compositePass.uniforms.tMask.value=maskFeather.texture; compositePass.uniforms.uEnabled.value=blurOn?1:0;
    composer.render();
  }
  setForm(1); blurOn=true;
  await renderer.compileAsync(scene, camera);   // formed: bottle + set + transmission + shadows (awaited!)
  warmFrame();
  { const _se=scene.environment; scene.environment=null; rebakeProbe(); scene.environment=_se; } // bake probe with env OFF → reflects lit geometry only, not the smooth gradient
  probeBaked=true;
  setForm(0.7); blurOn=false; warmFrame();
  setForm(0);  blurOn=false; bloom.enabled=true; bloom.strength=0.85;
  await renderer.compileAsync(scene, camera);   // dust: PointsMaterial
  warmFrame();                                   // composer.render runs the bloom pass → compiles it
  lastFormF = -1; setForm(0);

  loader.classList.add('hide');
}, (e)=>{ if(e.total) loader.textContent = 'loading… ' + Math.min(100, Math.round(e.loaded/e.total*100)) + '%'; },
   (err)=>{ loader.textContent = 'FAILED: ' + err; console.error(err); });

function logCamera(){
  console.log('=== CAMERA ===\n' + JSON.stringify({
    position: camera.position.toArray().map(n=>+n.toFixed(4)),
    target: controls.target.toArray().map(n=>+n.toFixed(4)),
    fov: camera.fov
  }, null, 2));
}

addEventListener('keydown', (e)=>{
  const k = e.key.toLowerCase();
  if(k==='c'){ logCamera(); }
  else if(k==='d'){ blurOn=!blurOn; }
  else if(k==='r' && window._home){ camera.position.copy(window._home); controls.target.copy(window._homeTarget); controls.update(); }
  else if(e.key==='['){ exposure=Math.max(0.1,exposure-0.05); renderer.toneMappingExposure=exposure; }
  else if(e.key===']'){ exposure=Math.min(3,exposure+0.05); renderer.toneMappingExposure=exposure; }
  else if(k==='e'){ const m = hdrEnv ? ['hdri','warm','off'] : ['warm','off']; applyEnv(m[(m.indexOf(envMode)+1)%m.length]); }
  else if(k==='b'){ bgHdr=!bgHdr; scene.background = (bgHdr&&hdrTex)?hdrTex:new THREE.Color(0x100b07); }
});

addEventListener('resize', ()=>{
  W=innerWidth;H=innerHeight; renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix();
  [sharpRT,maskRT,maskTmp,maskFeather,blurA,blurB,bloomRT].forEach(t=>t.dispose());
  allocTargets(); composer.setSize(W,H); bloom.setSize(W,H);
});

if(isMobile){ // pinch (2-finger) drives the materialize; 1-finger still orbits via OrbitControls
  let pd=null; const dist=t=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
  cv.addEventListener('touchstart',e=>{ if(e.touches.length===2) pd=dist(e.touches); },{passive:true});
  cv.addEventListener('touchmove', e=>{ if(e.touches.length===2 && pd!=null){ const d=dist(e.touches); targetF=clamp(targetF+(d-pd)/300); pd=d; } },{passive:true});
  cv.addEventListener('touchend', ()=>{ pd=null; });
}

// ---- brand / hint / AR (AR fires the same bottle-only assets as the hero) ----
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
const isAndroid = /android/i.test(navigator.userAgent);
const baseURL = location.href.split(/[?#]/)[0].replace(/[^/]*$/, '');
const arEl = document.getElementById('ar'), hintEl = document.getElementById('hint');
if(isMobile) hintEl.textContent = 'Pinch to materialize';
let toastTimer=null;
function showToast(html){ const t=document.getElementById('toast'); t.innerHTML=html; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),4200); }
function launchAR(){
  if(isIOS){ const a=document.createElement('a'); a.setAttribute('rel','ar'); a.appendChild(document.createElement('img')); a.href=baseURL+'shinobu_2k_ar.usdz'; a.click(); }
  else if(isAndroid){ const glb=encodeURIComponent(baseURL+'shinobu_2k_ar.glb'); const fb=encodeURIComponent(location.href);
    window.location.href='intent://arvr.google.com/scene-viewer/1.0?file='+glb+'&mode=ar_only&title='+encodeURIComponent('XRZENO — Shinobu')+'#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url='+fb+';end;'; }
  else { showToast('<b>View on mobile for AR</b><span class="t-sub">Open this page on your iOS or Android phone to place it in your space.</span>'); }
}
document.getElementById('arBtn').addEventListener('click', launchAR);

(function loop(){
  if(!isMobile) targetF = scrollProgress();          // desktop: page scroll drives form
  curF += (targetF-curF)*0.1; if(Math.abs(targetF-curF)<0.0004) curF=targetF;
  setForm(curF);
  if(dustPivot){ const u = 1 - clamp(curF/0.7); dustPivot.rotation.y = u*1.3 + performance.now()*0.00006*u; } // index2-style swirl: spiral-in + drift, unwinds to a clean lock by 70%
  blurOn = modelReady && curF>0.92;                  // DOF only once formed (don't blur the dust)
  arEl.classList.toggle('show', curF>0.85);          // AR button appears once formed
  hintEl.style.opacity = curF>0.04 ? '0' : '';       // hint fades the moment you start
  controls.update();
  renderMaskBlur();
  // bloom the dust embers — strength fades 0.85→0 as it forms, pass off once fully formed (index2)
  const formed = clamp((curF-0.55)/0.45);
  bloom.strength = 0.85 * (1 - formed);
  bloom.enabled  = modelReady && formed < 1;
  compositePass.uniforms.tSharp.value   = sharpRT.texture;
  compositePass.uniforms.tBlur.value    = blurB.texture;
  compositePass.uniforms.tMask.value    = maskFeather.texture;
  compositePass.uniforms.uEnabled.value = blurOn ? 1 : 0;
  composer.render();
  requestAnimationFrame(loop);
})();
</script>
